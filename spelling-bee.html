<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>2026 Spelling Bee</title>
<link rel="icon" type="image/png" href="favicon.png" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Helvetica Neue', Helvetica, Arial, system-ui, sans-serif;
  background: #0e1b12;
  color: #c4ffd8;
  min-height: 100vh;
}

header {
  background: linear-gradient(160deg, #001f14 0%, #005b3b 55%, #001a10 100%);
  box-shadow: 0 4px 28px rgba(0,232,122,0.12);
  padding: 2.25rem 2rem 2rem;
  text-align: center;
  position: relative;
  overflow: hidden;
}

header::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image: radial-gradient(rgba(0,232,122,0.1) 1px, transparent 1px);
  background-size: 28px 28px;
  pointer-events: none;
}

.header-inner {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 1.5rem;
}

.header-icon {
  width: 4.5rem;
  height: 4.5rem;
  flex-shrink: 0;
  filter:
    drop-shadow(0 0 6px  rgba(0,232,122,0.9))
    drop-shadow(0 0 18px rgba(0,232,122,0.55))
    drop-shadow(0 0 36px rgba(0,232,122,0.25));
}

.header-icon-flip { transform: scaleX(-1); }

header h1 {
  position: relative;
  font-size: clamp(2rem, 6vw, 3.75rem);
  font-weight: 900;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: #e8fff3;
  text-shadow:
    0 0 8px  rgba(0,232,122,0.95),
    0 0 24px rgba(0,232,122,0.6),
    0 0 52px rgba(0,232,122,0.3);
}


main {
  padding: 2rem 1.5rem 1.5rem;
  max-width: 1280px;
  margin: 0 auto;
}

.calendar-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1.25rem;
}

@media (min-width: 1400px) { .calendar-grid { grid-template-columns: repeat(4, 1fr); } }
@media (max-width: 750px)  { .calendar-grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 480px)  {
  .calendar-grid { grid-template-columns: 1fr; }
  main { padding: 1rem; }
}

.month-card {
  background: #132a18;
  border-radius: 12px;
  padding: 0.875rem;
  box-shadow: 0 2px 16px rgba(0,0,0,0.5);
  border: 1.5px solid #1f4a2c;
}

.month-name {
  font-size: 0.78rem;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  text-align: center;
  margin-bottom: 0.6rem;
  color: #00e87a;
}

.dow-row {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  margin-bottom: 0.2rem;
}

.dow-lbl {
  text-align: center;
  font-size: 0.55rem;
  font-weight: 700;
  color: #5a9970;
  text-transform: uppercase;
  padding-bottom: 0.2rem;
}

.days-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 2px;
}

.day-cell {
  aspect-ratio: 1;
  border-radius: 5px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  line-height: 1;
}

.day-cell.bee   { background: #0b3320; }
.day-cell.queen { background: #685100; }

.day-cell.today {
  box-shadow: 0 0 0 2px #00e87a, 0 0 10px rgba(0,232,122,0.4);
}

.day-num {
  font-size: 0.68rem;
  font-weight: 500;
  color: #7dc49a;
}


.day-emoji { font-size: 1.5rem; line-height: 1; }
.day-emoji img { width: 1em; height: 1em; object-fit: contain; display: block; }
.stat-icon img { width: 1.6em; height: 1.6em; object-fit: contain; display: block; margin: 0 auto; }

.progress-bar {
  width: 100%;
  height: 4px;
  background: #142e1c;
  position: relative;
  overflow: hidden;
}

.progress-fill {
  position: absolute;
  inset: 0;
  transform: scaleX(0);
  transition: transform 1.6s cubic-bezier(0.22, 1, 0.36, 1);
}

.progress-fill-left {
  transform-origin: left center;
  background: linear-gradient(to right, #00e87a 80%, rgba(0,232,122,0) 100%);
}

.progress-fill-right {
  transform-origin: right center;
  background: linear-gradient(to left, #00e87a 80%, rgba(0,232,122,0) 100%);
  transition-delay: 0.15s;
}

.stats {
  background: #060d08;
}

.stats-inner {
  max-width: 800px;
  margin: 0 auto;
  display: flex;
  justify-content: center;
  gap: 4rem;
  padding: 1.5rem 2rem 1.75rem;
}

.stat { text-align: center; min-width: 0; flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; }

.stat-icon  { font-size: 1.75rem; display: block; margin-bottom: 0.4rem; }
.stat-label { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.13em; color: #7dc49a; display: block; margin-bottom: 0.5rem; }
.stat-value {
  font-size: 4rem;
  font-weight: 900;
  color: #00e87a;
  line-height: 1;
  font-variant-numeric: tabular-nums;
  display: block;
  text-shadow: 0 0 18px rgba(0,232,122,0.5), 0 0 40px rgba(0,232,122,0.2);
}

@media (max-width: 600px) {
  .stats-inner { padding: 1rem 1rem 1.25rem; gap: 0.5rem; }
  .stat-value  { font-size: 2.5rem; }
  .stat-icon   { font-size: 1.25rem; }
  .stat-label  { font-size: 0.75rem; letter-spacing: 0.07em; }
}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <img src="favicon.png" alt="" class="header-icon" />
    <h1>Spelling Bee 2026</h1>
    <img src="favicon.png" alt="" class="header-icon header-icon-flip" />
  </div>
</header>

<section class="stats">
  <div class="progress-bar">
    <div class="progress-fill progress-fill-left" id="prog-top"></div>
  </div>
  <div class="stats-inner">
    <div class="stat">
      <span class="stat-icon">📅</span>
      <span class="stat-label">Number of Puzzles</span>
      <span class="stat-value" id="stat-day">0</span>
    </div>
    <div class="stat">
      <span class="stat-icon"><img src="favicon.png" alt="bee" /></span>
      <span class="stat-label">Genius</span>
      <span class="stat-value" id="stat-genius">0</span>
    </div>
    <div class="stat">
      <span class="stat-icon">👑</span>
      <span class="stat-label">Queen Bee</span>
      <span class="stat-value" id="stat-queen">0</span>
    </div>
  </div>
  <div class="progress-bar">
    <div class="progress-fill progress-fill-right" id="prog-bottom"></div>
  </div>
</section>

<main>
  <div class="calendar-grid" id="calendar"></div>
</main>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// YOUR DATA — edit this section and push a new commit each day.
//
// GENIUS: days you reached Genius (or better). Format: 'MM-DD'
// QUEEN:  days you reached Queen Bee (also counts toward Genius total).
// ─────────────────────────────────────────────────────────────────────────────

const GENIUS = [
  // January
  '01-01','01-02','01-03','01-04','01-05','01-06','01-07',
  '01-08','01-09','01-10','01-11','01-12','01-13','01-14',
  '01-15','01-16','01-17','01-18','01-19','01-20','01-21',
  '01-22','01-23','01-24','01-25','01-26','01-27','01-28',
  '01-29','01-30','01-31',
  // February
  '02-01','02-02','02-03','02-04','02-05','02-06','02-07',
  '02-08','02-09','02-10','02-11','02-12','02-13','02-14',
  '02-15','02-16','02-17','02-18','02-19','02-20','02-21',
  '02-22','02-23','02-24','02-25','02-26','02-27','02-28',
  // March
  '03-01','03-02','03-03','03-04','03-05','03-06','03-07',
  '03-08','03-09','03-10','03-11','03-12','03-13','03-14',
  '03-15','03-16','03-17','03-18','03-19','03-20','03-21',
  '03-22','03-23','03-24','03-25','03-26','03-27','03-28',
  '03-29','03-30','03-31',
  // April
  '04-01','04-02','04-03','04-04','04-05','04-06','04-07',
  '04-08','04-09','04-10','04-11','04-12','04-13','04-14',
  '04-15','04-16','04-17','04-18','04-19','04-20','04-21',
  '04-22','04-23','04-24','04-25','04-26','04-27','04-28',
  '04-29','04-30',
  // May
  '05-01','05-02','05-03','05-04','05-05','05-06','05-07',
  '05-08','05-09','05-10','05-11','05-12','05-13','05-14',
  '05-15','05-16','05-17','05-18','05-19'
];

const QUEEN = [
  '01-30','02-10','02-11','02-20','02-22','02-25','03-09',
  '03-24','03-27','04-01','04-06','05-04','05-05','05-13',
  '05-14','05-18'
];

// ─────────────────────────────────────────────────────────────────────────────

const MONTHS = ['January','February','March','April','May','June',
                'July','August','September','October','November','December'];
const DOW = ['Su','Mo','Tu','We','Th','Fr','Sa'];

const geniusSet = new Set(GENIUS);
const queenSet  = new Set(QUEEN);

function mmdd(m, d) {
  return String(m + 1).padStart(2, '0') + '-' + String(d).padStart(2, '0');
}

function getStatus(m, d) {
  const k = mmdd(m, d);
  if (queenSet.has(k))  return 'queen';
  if (geniusSet.has(k)) return 'bee';
  return 'none';
}

// Single source of truth: puzzle day rolls over at 10:00 Helsinki time.
function getEffectiveDate() {
  const parts = new Intl.DateTimeFormat('en-US', {
    timeZone: 'Europe/Helsinki',
    year: 'numeric', month: 'numeric', day: 'numeric',
    hour: 'numeric', hour12: false,
  }).formatToParts(new Date());
  const get = type => parseInt(parts.find(p => p.type === type).value, 10);
  const hour = get('hour') % 24;
  let year = get('year'), month = get('month') - 1, day = get('day');
  if (hour < 10) {
    const prev = new Date(Date.UTC(year, month, day) - 86400000);
    year = prev.getUTCFullYear(); month = prev.getUTCMonth(); day = prev.getUTCDate();
  }
  return { year, month, day };
}

const effectiveDate = getEffectiveDate();

function isToday(m, d) {
  return effectiveDate.year === 2026
      && effectiveDate.month === m
      && effectiveDate.day   === d;
}

function buildCalendar() {
  const cal = document.getElementById('calendar');

  for (let m = 0; m < 12; m++) {
    const card = document.createElement('div');
    card.className = 'month-card';

    const title = document.createElement('div');
    title.className = 'month-name';
    title.textContent = MONTHS[m];
    card.appendChild(title);

    const dow = document.createElement('div');
    dow.className = 'dow-row';
    DOW.forEach(l => {
      const lbl = document.createElement('div');
      lbl.className = 'dow-lbl';
      lbl.textContent = l;
      dow.appendChild(lbl);
    });
    card.appendChild(dow);

    const grid = document.createElement('div');
    grid.className = 'days-grid';

    const firstDow    = new Date(2026, m, 1).getDay();
    const daysInMonth = new Date(2026, m + 1, 0).getDate();

    for (let i = 0; i < firstDow; i++) {
      grid.appendChild(document.createElement('div'));
    }

    for (let d = 1; d <= daysInMonth; d++) {
      const s    = getStatus(m, d);
      const cell = document.createElement('div');
      cell.className = 'day-cell' + (s !== 'none' ? ' ' + s : '') + (isToday(m, d) ? ' today' : '');

      if (s !== 'none') {
        const em = document.createElement('span');
        em.className = 'day-emoji';
        if (s === 'bee') {
          const img = document.createElement('img');
          img.src = 'favicon.png';
          img.alt = 'bee';
          em.appendChild(img);
        } else {
          em.textContent = '👑';
        }
        cell.appendChild(em);
      } else {
        const num = document.createElement('span');
        num.className = 'day-num';
        num.textContent = d;
        cell.appendChild(num);
      }

      grid.appendChild(cell);
    }

    card.appendChild(grid);
    cal.appendChild(card);
  }
}

function getDayOfYear() {
  const { year, month, day } = effectiveDate;
  const start = Date.UTC(year, 0, 0);
  const end   = Date.UTC(year, month, day);
  return Math.floor((end - start) / 86400000);
}

function animateCount(el, target, ms = 1300) {
  const t0 = performance.now();
  function tick(now) {
    const p    = Math.min((now - t0) / ms, 1);
    const ease = 1 - Math.pow(1 - p, 4);
    el.textContent = Math.round(target * ease);
    if (p < 1) requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

buildCalendar();

const totalGenius = geniusSet.size;
animateCount(document.getElementById('stat-day'),    getDayOfYear());
animateCount(document.getElementById('stat-genius'), totalGenius);
animateCount(document.getElementById('stat-queen'),  queenSet.size);

const yearPct = getDayOfYear() / 365;
requestAnimationFrame(() => requestAnimationFrame(() => {
  document.getElementById('prog-top').style.transform    = `scaleX(${yearPct})`;
  document.getElementById('prog-bottom').style.transform = `scaleX(${yearPct})`;
}));
</script>
</body>
</html>
